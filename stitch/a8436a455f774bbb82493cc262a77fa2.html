<style>
        body { background-color: #F8FAFC; }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex">
<!-- SideNavBar (Desktop) -->
<nav class="hidden md:flex flex-col h-screen w-[240px] fixed left-0 top-0 bg-surface-container-low dark:bg-surface-container-lowest border-r border-outline-variant dark:border-outline p-md gap-sm transition-all duration-200 ease-in-out z-20">
<div class="mb-lg">
<h1 class="text-headline-md font-headline-md text-primary dark:text-primary-fixed">Rootfix Console</h1>
<p class="text-body-sm font-body-sm text-secondary">System Admin</p>
</div>
<div class="flex flex-col gap-xs flex-grow">
<!-- Inactive -->
<a class="flex items-center gap-sm px-sm py-sm rounded-DEFAULT text-on-surface-variant dark:text-on-secondary-fixed-variant hover:bg-surface-variant dark:hover:bg-surface-container-high transition-colors" href="#">
<span class="material-symbols-outlined text-xl" data-icon="data_thresholding">data_thresholding</span>
<span class="text-body-sm font-body-sm">Operations</span>
</a>
<!-- Inactive -->
<a class="flex items-center gap-sm px-sm py-sm rounded-DEFAULT text-on-surface-variant dark:text-on-secondary-fixed-variant hover:bg-surface-variant dark:hover:bg-surface-container-high transition-colors" href="#">
<span class="material-symbols-outlined text-xl" data-icon="dashboard">dashboard</span>
<span class="text-body-sm font-body-sm">Board</span>
</a>
<!-- Inactive -->
<a class="flex items-center gap-sm px-sm py-sm rounded-DEFAULT text-on-surface-variant dark:text-on-secondary-fixed-variant hover:bg-surface-variant dark:hover:bg-surface-container-high transition-colors" href="#">
<span class="material-symbols-outlined text-xl" data-icon="analytics">analytics</span>
<span class="text-body-sm font-body-sm">Insights</span>
</a>
<!-- Active -->
<a class="flex items-center gap-sm px-sm py-sm bg-secondary-container dark:bg-primary-container text-on-secondary-container dark:text-on-primary-container rounded-lg font-bold transition-colors" href="#">
<span class="material-symbols-outlined text-xl" data-icon="edit_note">edit_note</span>
<span class="text-body-sm font-body-sm">Editor</span>
</a>
</div>
<div class="mt-auto">
<button class="w-full flex items-center justify-center gap-sm py-sm bg-primary-container text-on-primary rounded-DEFAULT hover:bg-primary transition-colors">
<span class="material-symbols-outlined text-xl">add</span>
<span class="text-body-sm font-body-sm font-bold">New Record</span>
</button>
</div>
</nav>
<!-- Main Content Area -->
<div class="flex-1 md:ml-[240px] flex flex-col min-h-screen">
<!-- TopNavBar -->
<header class="bg-surface dark:bg-surface-container-lowest border-b border-outline-variant dark:border-outline w-full h-16 flex justify-between items-center px-lg max-w-[1600px] mx-auto z-10 sticky top-0">
<div class="flex items-center gap-md">
<!-- Mobile Menu Toggle -->
<button class="md:hidden p-xs text-on-surface hover:bg-surface-container-low rounded-DEFAULT">
<span class="material-symbols-outlined">menu</span>
</button>
<div class="text-headline-md font-headline-md font-extrabold text-primary dark:text-primary-fixed md:hidden">
                    Runtime Ping Converter Rootfix
                </div>
</div>
<div class="hidden md:flex gap-md items-center h-full">
<a class="h-full flex items-center text-secondary dark:text-secondary-fixed-dim font-body-md hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors px-sm" href="#">Operations</a>
<a class="h-full flex items-center text-secondary dark:text-secondary-fixed-dim font-body-md hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors px-sm" href="#">Board</a>
<a class="h-full flex items-center text-secondary dark:text-secondary-fixed-dim font-body-md hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors px-sm" href="#">Insights</a>
</div>
<div class="flex items-center gap-sm text-primary dark:text-on-primary-fixed">
<button class="p-xs hover:bg-surface-container-low dark:hover:bg-surface-container-high rounded-full transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<button class="p-xs hover:bg-surface-container-low dark:hover:bg-surface-container-high rounded-full transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</div>
</header>
<!-- Canvas -->
<main class="flex-1 p-margin-mobile md:p-margin-desktop max-w-[1600px] mx-auto w-full">
<div class="max-w-3xl mx-auto">
<!-- Editor Header -->
<div class="flex items-center justify-between mb-xl">
<div>
<h2 class="text-headline-lg font-headline-lg text-on-surface mb-xs">Edit Record</h2>
<div class="flex items-center gap-sm">
<span class="flex items-center gap-xs px-sm py-xs bg-surface-container-highest text-on-surface-variant text-label-caps font-label-caps rounded-full">
<span class="material-symbols-outlined text-[14px]">edit_document</span>
                                Draft - Unsaved
                            </span>
</div>
</div>
</div>
<!-- Editor Form Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-lg shadow-sm">
<form class="flex flex-col gap-lg">
<!-- Record Name -->
<div class="flex flex-col gap-xs">
<label class="text-body-sm font-body-sm font-bold text-primary" for="record-name">Record Name <span class="text-error">*</span></label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-sm text-body-md font-body-md focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all" id="record-name" name="record-name" type="text" value="Prod-Router-Ping-01"/>
</div>
<!-- Source URL -->
<div class="flex flex-col gap-xs">
<label class="text-body-sm font-body-sm font-bold text-primary" for="source-url">Source URL <span class="text-error">*</span></label>
<input class="w-full bg-surface-container-lowest border border-error rounded-DEFAULT px-md py-sm text-body-md font-body-md focus:outline-none focus:ring-2 focus:ring-error focus:border-transparent transition-all" id="source-url" name="source-url" type="text" value="http//internal-router.prod.local"/>
<span class="text-body-sm font-body-sm text-error flex items-center gap-xs mt-xs">
<span class="material-symbols-outlined text-[16px]">error</span>
                                Invalid URL format. Must include valid protocol.
                            </span>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Ping Interval -->
<div class="flex flex-col gap-xs">
<label class="text-body-sm font-body-sm font-bold text-primary" for="ping-interval">Ping Interval (ms) <span class="text-error">*</span></label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT pl-md pr-xl py-sm text-code-sm font-code-sm focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all" id="ping-interval" name="ping-interval" type="number" value="1500"/>
<span class="absolute right-md top-1/2 -translate-y-1/2 text-body-sm text-on-surface-variant pointer-events-none">ms</span>
</div>
</div>
<!-- Rootfix Protocol -->
<div class="flex flex-col gap-xs">
<label class="text-body-sm font-body-sm font-bold text-primary" for="protocol">Rootfix Protocol</label>
<select class="w-full bg-surface-container-lowest border border-outline-variant rounded-DEFAULT px-md py-sm text-body-md font-body-md focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all appearance-none cursor-pointer" id="protocol" name="protocol">
<option value="icmp">ICMP (Default)</option>
<option selected="" value="tcp">TCP Connect</option>
<option value="udp">UDP Echo</option>
<option value="http">HTTP HEAD</option>
</select>
</div>
</div>
<!-- Advanced Settings Toggle (Example of density) -->
<div class="mt-md border-t border-outline-variant pt-md">
<button class="flex items-center gap-sm text-body-sm font-body-sm text-secondary hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]">tune</span>
                                Show Advanced Configuration
                            </button>
</div>
</form>
</div>
<!-- Action Footer -->
<div class="mt-xl flex items-center justify-end gap-md">
<button class="px-md py-sm bg-surface-container-lowest border border-outline-variant text-primary text-body-md font-body-md font-medium rounded-DEFAULT hover:bg-surface-container-low transition-colors" type="button">
                        Cancel
                    </button>
<button class="px-md py-sm bg-primary-container text-on-primary text-body-md font-body-md font-medium rounded-DEFAULT hover:opacity-90 transition-opacity flex items-center gap-sm" type="button">
<span class="material-symbols-outlined text-[18px]">save</span>
                        Save Record
                    </button>
</div>
</div>
</main>
</div>
</body></html>
